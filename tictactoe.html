<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      color: #a8dadc;
      font-weight: 600;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.winner {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 8px #e94560; }
      to   { box-shadow: 0 0 20px #e94560; }
    }

    #reset {
      margin-top: 2rem;
      padding: 0.65rem 2.2rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s, transform 0.1s;
    }

    #reset:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    #scoreboard {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      color: #aaa;
    }

    .score-item { text-align: center; }
    .score-item span {
      display: block;
      font-size: 1.8rem;
      font-weight: 700;
    }
    .score-item.x-score span { color: #e94560; }
    .score-item.draw-score span { color: #aaa; }
    .score-item.o-score span { color: #a8dadc; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scoreboard">
    <div class="score-item x-score">X <span id="score-x">0</span></div>
    <div class="score-item draw-score">Draws <span id="score-d">0</span></div>
    <div class="score-item o-score">O <span id="score-o">0</span></div>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diags
    ];

    let board, current, over;
    let scores = { X: 0, O: 0, D: 0 };

    const cells   = document.querySelectorAll('.cell');
    const status  = document.getElementById('status');
    const scoreX  = document.getElementById('score-x');
    const scoreO  = document.getElementById('score-o');
    const scoreD  = document.getElementById('score-d');

    function init() {
      board   = Array(9).fill('');
      current = 'X';
      over    = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className   = 'cell';
      });
      status.textContent = `Player X's turn`;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(v => v)) return { winner: null, line: [] };
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add(current.toLowerCase(), 'taken');

        const result = checkWinner();
        if (result) {
          over = true;
          if (result.winner) {
            result.line.forEach(idx => cells[idx].classList.add('winner'));
            status.textContent = `Player ${result.winner} wins!`;
            scores[result.winner]++;
          } else {
            status.textContent = "It's a draw!";
            scores.D++;
          }
          scoreX.textContent = scores.X;
          scoreO.textContent = scores.O;
          scoreD.textContent = scores.D;
          return;
        }

        current = current === 'X' ? 'O' : 'X';
        status.textContent = `Player ${current}'s turn`;
      });
    });

    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
